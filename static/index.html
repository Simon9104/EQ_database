<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EQ Projekty</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>EQ Projekty</h1>
    <small id="current-user">—</small>
  </div>
  <nav>
    <a data-view="dashboard"><span class="icon">📊</span> Dashboard</a>
    <a data-view="projects"><span class="icon">📁</span> Projekty</a>
    <a data-view="items"><span class="icon">📋</span> Položky</a>
    <a data-view="invoices"><span class="icon">🧾</span> Faktúry</a>
    <a data-view="firmy"><span class="icon">🏢</span> Firmy</a>
    <a data-view="credits"><span class="icon">🏦</span> Bankové pohyby</a>
    <a data-view="imposition"><span class="icon">📄</span> Vyradovanie</a>
    <a data-view="iqk"><span class="icon">📚</span> IQK</a>
    <a data-view="settings"><span class="icon">⚙️</span> Nastavenia</a>
  </nav>
  <div id="sidebar-footer">EQ Projekty v1.0</div>
</div>

<div id="main">
  <div id="topbar">
    <h2 id="topbar-title">Dashboard</h2>
    <div style="display:flex;gap:8px;align-items:center">
      <input type="search" id="global-search" placeholder="🔍 Hľadať..." style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;width:200px;outline:none" autocomplete="off">
      <button class="btn btn-secondary btn-sm" id="export-btn" style="display:none" onclick="App.exportCurrent()">↓ Export CSV</button>
      <button class="btn btn-primary" id="add-btn" style="display:none" onclick="App.openAdd()">+ Pridať</button>
    </div>
  </div>
  <div id="content">
    <div class="loading">Načítavam...</div>
  </div>
</div>

<!-- Detail Panel -->
<div class="detail-panel" id="detail-panel">
  <div class="detail-header">
    <h3 id="detail-title">Detail</h3>
    <button class="btn btn-sm btn-secondary" id="detail-edit-btn">✏️ Upraviť</button>
    <button class="modal-close" onclick="App.closeDetail()">×</button>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" style="display:none" onclick="if(event.target===this)App.closeModal()">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h3 id="modal-title">Pridať</h3>
      <button class="modal-close" onclick="App.closeModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="App.closeModal()">Zrušiť</button>
      <button class="btn btn-danger btn-sm" id="modal-delete-btn" style="display:none;margin-right:auto" onclick="App.deleteRecord()">🗑 Odstrániť</button>
      <button class="btn btn-primary" id="modal-save-btn" onclick="App.saveRecord()">Uložiť</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<script src="/static/app.js"></script>
</body>
</html>
