<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EQ Projekty – Prihlásenie</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f8; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-box { background: #fff; border-radius: 14px; box-shadow: 0 4px 32px rgba(0,0,0,0.10); padding: 40px 36px; width: 100%; max-width: 380px; }
  .logo { text-align: center; margin-bottom: 28px; }
  .logo h1 { font-size: 22px; font-weight: 700; color: #1a202c; }
  .logo p { font-size: 13px; color: #718096; margin-top: 4px; }
  .field { margin-bottom: 16px; }
  label { display: block; font-size: 13px; font-weight: 500; color: #4a5568; margin-bottom: 6px; }
  input { width: 100%; padding: 10px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 14px; outline: none; transition: border-color 0.2s; }
  input:focus { border-color: #4299e1; }
  .btn { width: 100%; padding: 11px; border: none; border-radius: 8px; background: #3182ce; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 4px; transition: background 0.2s; }
  .btn:hover { background: #2b6cb0; }
  .btn:disabled { background: #a0aec0; cursor: not-allowed; }
  .error { background: #fff5f5; border: 1px solid #fed7d7; color: #c53030; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; display: none; }
  .footer { text-align: center; margin-top: 24px; font-size: 12px; color: #a0aec0; }
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">
    <h1>EQ Projekty</h1>
    <p>Prihláste sa do systému</p>
  </div>
  <div class="error" id="error-msg"></div>
  <form onsubmit="doLogin(event)">
    <div class="field">
      <label for="username">Používateľské meno</label>
      <input type="text" id="username" autocomplete="username" autofocus required>
    </div>
    <div class="field">
      <label for="password">Heslo</label>
      <input type="password" id="password" autocomplete="current-password" required>
    </div>
    <button class="btn" type="submit" id="login-btn">Prihlásiť sa</button>
  </form>
  <div class="footer">EQ Projekty v1.0</div>
</div>
<script>
async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('error-msg');
  err.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Prihlasujem...';
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
      }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.detail || 'Chyba prihlásenia');
    window.location.href = '/';
  } catch (ex) {
    err.textContent = ex.message;
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Prihlásiť sa';
  }
}
</script>
</body>
</html>
